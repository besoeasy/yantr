services:
  tor:
    image: containers.torproject.org/tpo/onion-services/onimages/tor:alpine
    container_name: cashu-me-tor
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Tor Onion Service"
    restart: unless-stopped
    network_mode: host
    volumes:
      - tor-keys:/var/lib/tor

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cashu-me
    labels:
      yantr.app: "cashu-me"
      yantr.service: "Web UI"
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-UTC}

volumes:
  tor-keys:
