services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-amd
    labels:
      yantr.app: "ollama-amd"
      yantr.service: "Ollama with AMD GPU"
    environment:
      OLLAMA_HOST: "0.0.0.0"
      OLLAMA_NUM_GPU: "999"
    devices:
      - /dev/kfd
      - /dev/dri
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ollama_network

volumes:
  ollama_data:

networks:
  ollama_network:
    name: ollama_network
