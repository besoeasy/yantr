services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    labels:
      yantr.name: "Ollama"
      yantr.logo: "QmdJujFNrnbZ8Z9SVzrZGoUEvcxg5TQqizNg51nUcwcp5Z"
      yantr.category: "ai,backend"
      yantr.port: "11434 (HTTP - API)"
      yantr.description: "Local LLM inference server - run models like Llama, Mistral, and more. Automatically uses GPU when available."
      yantr.website: "https://ollama.ai"
    ports:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 28G

    mem_swappiness: 0
    shm_size: 8gb

    environment:
      - OLLAMA_PREFER_GPU=true
      - OLLAMA_HOST=0.0.0.0
    networks:
      - ollama_network

volumes:
  ollama_data:

networks:
  ollama_network:
    name: ollama_network
